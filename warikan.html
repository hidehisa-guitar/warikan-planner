<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>割り勘プラン</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f2ec;
        --paper: #fffdf8;
        --ink: #222426;
        --muted: #72777d;
        --line: #d8d1c7;
        --green: #1f8f67;
        --blue: #2b6fba;
        --red: #d65d4a;
        --gold: #d89a28;
        --shadow: 0 18px 50px rgba(31, 28, 22, 0.14);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(130deg, rgba(43, 111, 186, 0.12), transparent 34%),
          linear-gradient(260deg, rgba(31, 143, 103, 0.12), transparent 32%),
          var(--bg);
        color: var(--ink);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(1120px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 28px 0;
        display: grid;
        grid-template-columns: minmax(310px, 0.8fr) minmax(0, 1.2fr);
        gap: 18px;
      }

      .panel {
        background: rgba(255, 253, 248, 0.96);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .inputs {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .plans {
        padding: 24px;
        min-height: 680px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4.7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .lead {
        margin: 10px 0 0;
        color: var(--muted);
        font-weight: 650;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      label,
      .counter-label {
        color: var(--ink);
        font-weight: 800;
      }

      .total-input {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .total-input input {
        width: 100%;
        border: 0;
        outline: 0;
        padding: 0 14px;
        color: var(--ink);
        background: transparent;
        font-size: 1.7rem;
        font-weight: 850;
      }

      .yen {
        padding-right: 14px;
        color: var(--muted);
        font-weight: 850;
      }

      .counter {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .counter small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-weight: 700;
      }

      .stepper {
        display: grid;
        grid-template-columns: 44px 54px 44px;
        gap: 8px;
        align-items: center;
      }

      .stepper button {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f7f4ee;
        color: var(--ink);
        cursor: pointer;
        font-size: 1.35rem;
        font-weight: 900;
      }

      .count {
        min-width: 54px;
        text-align: center;
        font-size: 1.45rem;
        font-weight: 900;
      }

      .summary {
        padding: 14px;
        border-radius: 8px;
        background: #ece7de;
        color: var(--muted);
        font-weight: 750;
        line-height: 1.6;
      }

      .summary strong {
        color: var(--ink);
      }

      .plan-list {
        margin-top: 22px;
        display: grid;
        gap: 14px;
      }

      .plan {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .plan-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .plan h2 {
        margin: 0;
        font-size: 1rem;
      }

      .badge {
        padding: 5px 9px;
        border-radius: 999px;
        color: #fff;
        background: var(--blue);
        font-size: 0.76rem;
        font-weight: 850;
        white-space: nowrap;
      }

      .badge.green {
        background: var(--green);
      }

      .badge.gold {
        background: var(--gold);
      }

      .plan-body {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .line-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: baseline;
      }

      .line-item span {
        color: var(--muted);
        font-weight: 750;
      }

      .line-item strong {
        font-size: 1.4rem;
        white-space: nowrap;
      }

      .remainder {
        margin-top: 4px;
        padding-top: 12px;
        border-top: 1px dashed var(--line);
      }

      .remainder strong {
        color: var(--red);
      }

      .empty {
        margin-top: 22px;
        min-height: 220px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
        font-weight: 750;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }

        .plans {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel inputs" aria-label="入力">
        <div>
          <h1>割り勘</h1>
          <p class="lead">飲み方に差がある日の会計案をいくつか出します。</p>
        </div>

        <div class="field">
          <label for="total">全体会計</label>
          <div class="total-input">
            <input id="total" type="number" min="0" step="100" value="30200" inputmode="numeric" />
            <span class="yen">円</span>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">アルコールあり</span>
            <small>しっかり飲んだ人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="alcohol" data-step="-1" aria-label="アルコールありを減らす">−</button>
            <span class="count" id="alcoholCount">4</span>
            <button type="button" data-target="alcohol" data-step="1" aria-label="アルコールありを増やす">+</button>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">アルコールなし</span>
            <small>食事中心の人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="soft" data-step="-1" aria-label="アルコールなしを減らす">−</button>
            <span class="count" id="softCount">1</span>
            <button type="button" data-target="soft" data-step="1" aria-label="アルコールなしを増やす">+</button>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">途中参加（少なめ）</span>
            <small>遅れて来た人・短時間の人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="late" data-step="-1" aria-label="途中参加を減らす">−</button>
            <span class="count" id="lateCount">0</span>
            <button type="button" data-target="late" data-step="1" aria-label="途中参加を増やす">+</button>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">なし</span>
            <small>支払いなしで扱う人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="none" data-step="-1" aria-label="なしを減らす">−</button>
            <span class="count" id="noneCount">1</span>
            <button type="button" data-target="none" data-step="1" aria-label="なしを増やす">+</button>
          </div>
        </div>

        <div class="summary" id="summary"></div>
      </section>

      <section class="panel plans" aria-label="割り勘プラン">
        <h1>Plans</h1>
        <div class="plan-list" id="planList"></div>
      </section>
    </main>

    <script>
      const totalInput = document.querySelector("#total");
      const counts = { alcohol: 4, soft: 1, late: 0, none: 1 };
      const countEls = {
        alcohol: document.querySelector("#alcoholCount"),
        soft: document.querySelector("#softCount"),
        late: document.querySelector("#lateCount"),
        none: document.querySelector("#noneCount"),
      };
      const summary = document.querySelector("#summary");
      const planList = document.querySelector("#planList");

      const yen = new Intl.NumberFormat("ja-JP", {
        style: "currency",
        currency: "JPY",
        maximumFractionDigits: 0,
      });

      function formatYen(value) {
        return yen.format(value);
      }

      function roundTo(value, unit) {
        return Math.max(0, Math.round(value / unit) * unit);
      }

      function makePlan(name, badge, badgeClass, alcohol, soft, late, none) {
        const paid =
          alcohol * counts.alcohol + soft * counts.soft + late * counts.late + none * counts.none;
        return {
          name,
          badge,
          badgeClass,
          alcohol,
          soft,
          late,
          none,
          paid,
          remainder: Number(totalInput.value || 0) - paid,
        };
      }

      function generatePlans() {
        const total = Number(totalInput.value || 0);
        const payerCount = counts.alcohol + counts.soft + counts.late;
        if (total <= 0 || payerCount <= 0) return [];

        const roughEven = total / Math.max(1, payerCount);
        const targetAlcohol = roundTo(roughEven * 1.08, 500);
        const targetSoft = roundTo(targetAlcohol * 0.62, 500);
        const targetLate = roundTo(targetAlcohol * 0.38, 500);
        const options = [];

        for (let alcohol = 500; alcohol <= Math.max(total, 500); alcohol += 500) {
          for (let soft = 0; soft <= alcohol; soft += 500) {
            const maxLate = counts.late > 0 ? soft : 0;
            for (let late = 0; late <= maxLate; late += 500) {
              const paid = alcohol * counts.alcohol + soft * counts.soft + late * counts.late;
              const remainder = total - paid;
              if (remainder < 0 || remainder >= 1000) continue;
              const softRatio = alcohol === 0 ? 0 : soft / alcohol;
              const lateRatio = alcohol === 0 ? 0 : late / alcohol;
              const score =
                Math.abs(alcohol - targetAlcohol) +
                Math.abs(soft - targetSoft) +
                Math.abs(late - targetLate) +
                Math.abs(softRatio - 0.62) * 1200 +
                Math.abs(lateRatio - 0.38) * 900 +
                Math.abs(remainder - 200) * 0.5;
              options.push({ alcohol, soft, late, none: 0, remainder, score });
            }
          }
        }

        options.sort((a, b) => a.score - b.score);
        const picked = [];
        const seen = new Set();
        for (const option of options) {
          const key = `${option.alcohol}-${option.soft}-${option.none}`;
          if (!seen.has(key)) {
            picked.push(option);
            seen.add(key);
          }
          if (picked.length === 3) break;
        }

        const plans = picked.map((option, index) => {
          const names = ["おすすめ", "飲む人寄り", "途中参加軽め"];
          const badges = ["端数少なめ", "バランス", "やさしめ"];
          const classes = ["green", "blue", "gold"];
          return makePlan(
            names[index],
            badges[index],
            classes[index],
            option.alcohol,
            option.soft,
            option.late,
            0,
          );
        });

        const evenUnit = roundTo(
          total / Math.max(1, counts.alcohol + counts.soft + counts.late + counts.none),
          500,
        );
        if (counts.none > 0 && evenUnit > 0) {
          const noneShare = Math.min(1000, evenUnit);
          const rest = total - noneShare * counts.none;
          const alcohol = roundTo((rest / Math.max(1, counts.alcohol + counts.soft + counts.late)) * 1.08, 500);
          const soft = roundTo(Math.min(alcohol, alcohol * 0.68), 500);
          const late = roundTo(Math.min(soft, alcohol * 0.4), 500);
          const supportPlan = makePlan("なしも少し参加", "全員感", "blue", alcohol, soft, late, noneShare);
          if (supportPlan.remainder >= 0 && supportPlan.remainder < 1500) plans.push(supportPlan);
        }

        return plans.slice(0, 4);
      }

      function renderPlan(plan) {
        return `
          <article class="plan">
            <div class="plan-head">
              <h2>${plan.name}</h2>
              <span class="badge ${plan.badgeClass}">${plan.badge}</span>
            </div>
            <div class="plan-body">
              <div class="line-item">
                <span>アルコールあり ${counts.alcohol}人</span>
                <strong>${formatYen(plan.alcohol)} × ${counts.alcohol}</strong>
              </div>
              <div class="line-item">
                <span>アルコールなし ${counts.soft}人</span>
                <strong>${formatYen(plan.soft)} × ${counts.soft}</strong>
              </div>
              <div class="line-item">
                <span>途中参加（少なめ） ${counts.late}人</span>
                <strong>${formatYen(plan.late)} × ${counts.late}</strong>
              </div>
              <div class="line-item">
                <span>なし ${counts.none}人</span>
                <strong>${formatYen(plan.none)} × ${counts.none}</strong>
              </div>
              <div class="line-item remainder">
                <span>端数</span>
                <strong>${formatYen(plan.remainder)}</strong>
              </div>
            </div>
          </article>
        `;
      }

      function render() {
        Object.entries(countEls).forEach(([key, element]) => {
          element.textContent = counts[key];
        });

        const total = Number(totalInput.value || 0);
        const people = counts.alcohol + counts.soft + counts.late + counts.none;
        summary.innerHTML = `<strong>${formatYen(total)}</strong> / 参加 ${people}人 / 支払い対象 ${counts.alcohol + counts.soft + counts.late}人`;

        const plans = generatePlans();
        planList.innerHTML = plans.length
          ? plans.map(renderPlan).join("")
          : `<div class="empty">全体会計と人数を入れると、支払い案が表示されます。</div>`;
      }

      document.querySelectorAll("[data-target]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.target;
          const step = Number(button.dataset.step);
          counts[key] = Math.max(0, counts[key] + step);
          render();
        });
      });

      totalInput.addEventListener("input", render);
      render();
    </script>
  </body>
</html>
