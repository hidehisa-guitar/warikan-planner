<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Warikan Planner</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f2ec;
        --paper: #fffdf8;
        --ink: #222426;
        --muted: #72777d;
        --line: #d8d1c7;
        --green: #1f8f67;
        --blue: #2b6fba;
        --red: #d65d4a;
        --gold: #d89a28;
        --shadow: 0 18px 50px rgba(31, 28, 22, 0.14);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(130deg, rgba(43, 111, 186, 0.12), transparent 34%),
          linear-gradient(260deg, rgba(31, 143, 103, 0.12), transparent 32%),
          var(--bg);
        color: var(--ink);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(1120px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 28px 0;
        display: grid;
        grid-template-columns: minmax(310px, 0.8fr) minmax(0, 1.2fr);
        gap: 18px;
      }

      .byline {
        grid-column: 1 / -1;
        margin: -6px 0 -8px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0;
      }

      .byline a {
        color: inherit;
        text-decoration: none;
      }

      .byline a:hover {
        color: var(--ink);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .panel {
        background: rgba(255, 253, 248, 0.96);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .inputs {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .plans {
        padding: 24px;
        min-height: 680px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4.7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .lead {
        margin: 10px 0 0;
        color: var(--muted);
        font-weight: 650;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      label,
      .counter-label {
        color: var(--ink);
        font-weight: 800;
      }

      .total-input {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .total-input input {
        width: 100%;
        border: 0;
        outline: 0;
        padding: 0 14px;
        color: var(--ink);
        background: transparent;
        font-size: 1.7rem;
        font-weight: 850;
      }

      .yen {
        padding-right: 14px;
        color: var(--muted);
        font-weight: 850;
      }

      .counter {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .counter small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-weight: 700;
      }

      .stepper {
        display: grid;
        grid-template-columns: 44px 54px 44px;
        gap: 8px;
        align-items: center;
      }

      .stepper button {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f7f4ee;
        color: var(--ink);
        cursor: pointer;
        font-size: 1.35rem;
        font-weight: 900;
      }

      .count {
        min-width: 54px;
        text-align: center;
        font-size: 1.45rem;
        font-weight: 900;
      }

      .summary {
        padding: 14px;
        border-radius: 8px;
        background: #ece7de;
        color: var(--muted);
        font-weight: 750;
        line-height: 1.6;
      }

      .summary strong {
        color: var(--ink);
      }

      .plan-list {
        margin-top: 22px;
        display: grid;
        gap: 14px;
      }

      .plan {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .plan-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .plan h2 {
        margin: 0;
        font-size: 1rem;
      }

      .plan-title {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      .reset-button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f7f4ee;
        color: var(--ink);
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 850;
        padding: 7px 10px;
        white-space: nowrap;
      }

      .reset-button:disabled {
        color: #a8aeb4;
        cursor: not-allowed;
        opacity: 0.58;
      }

      .badge {
        padding: 5px 9px;
        border-radius: 999px;
        color: #fff;
        background: var(--blue);
        font-size: 0.76rem;
        font-weight: 850;
        white-space: nowrap;
      }

      .badge.green {
        background: var(--green);
      }

      .badge.gold {
        background: var(--gold);
      }

      .plan-body {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .line-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
      }

      .line-item span {
        color: var(--muted);
        font-weight: 750;
      }

      .line-item strong {
        font-size: 1.4rem;
        white-space: nowrap;
      }

      .amount-control {
        display: grid;
        grid-template-columns: 34px minmax(96px, 132px) 34px auto;
        gap: 6px;
        align-items: center;
      }

      .amount-control button {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f7f4ee;
        color: var(--ink);
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 900;
      }

      .amount-control input {
        width: 100%;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 8px;
        color: var(--ink);
        background: #fff;
        text-align: right;
        font-weight: 850;
      }

      .amount-control .multiply {
        color: var(--ink);
        font-size: 1rem;
        font-weight: 850;
        white-space: nowrap;
      }

      .remainder {
        margin-top: 4px;
        padding-top: 12px;
        border-top: 1px dashed var(--line);
      }

      .remainder-tools {
        width: 314px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
      }

      .remainder strong {
        color: var(--red);
      }

      .zero-button {
        justify-self: start;
        min-height: 34px;
        border: 0;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        font-weight: 900;
      }

      .switch-track {
        width: 48px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #d7d1c8;
        padding: 2px;
        transition:
          background 160ms ease,
          border-color 160ms ease;
      }

      .switch-thumb {
        display: block;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        color: #fff;
        background: #fff;
        box-shadow: 0 2px 7px rgba(31, 28, 22, 0.2);
        transition: transform 160ms ease;
      }

      .zero-button.is-on .switch-track {
        border-color: var(--green);
        background: var(--green);
      }

      .zero-button.is-on .switch-thumb {
        transform: translateX(22px);
      }

      .empty {
        margin-top: 22px;
        min-height: 220px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
        font-weight: 750;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }

        .plans {
          min-height: auto;
        }

        .line-item {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .amount-control {
          grid-template-columns: 38px minmax(0, 1fr) 38px auto;
        }

        .remainder-tools {
          width: 100%;
          grid-template-columns: 1fr auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="byline">
        by
        <a href="https://note.com/hidehisa_guitar/m/m9e336a3956ca" target="_blank" rel="noopener noreferrer">Hidehisa Sasaki Guitar Method</a>
      </div>
      <section class="panel inputs" aria-label="入力">
        <div>
          <h1>Warikan Planner</h1>
          <p class="lead">飲み方に差がある日の会計案をいくつか出します。</p>
        </div>

        <div class="field">
          <label for="total">全体会計</label>
          <div class="total-input">
            <input id="total" type="number" min="0" step="100" value="25430" inputmode="numeric" />
            <span class="yen">円</span>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">アルコールあり</span>
            <small>しっかり飲んだ人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="alcohol" data-step="-1" aria-label="アルコールありを減らす">−</button>
            <span class="count" id="alcoholCount">4</span>
            <button type="button" data-target="alcohol" data-step="1" aria-label="アルコールありを増やす">+</button>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">アルコールなし</span>
            <small>食事中心の人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="soft" data-step="-1" aria-label="アルコールなしを減らす">−</button>
            <span class="count" id="softCount">1</span>
            <button type="button" data-target="soft" data-step="1" aria-label="アルコールなしを増やす">+</button>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">途中参加（少なめ）</span>
            <small>遅れて来た人・短時間の人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="late" data-step="-1" aria-label="途中参加を減らす">−</button>
            <span class="count" id="lateCount">1</span>
            <button type="button" data-target="late" data-step="1" aria-label="途中参加を増やす">+</button>
          </div>
        </div>

        <div class="counter">
          <div>
            <span class="counter-label">なし</span>
            <small>支払いなしで扱う人</small>
          </div>
          <div class="stepper">
            <button type="button" data-target="none" data-step="-1" aria-label="なしを減らす">−</button>
            <span class="count" id="noneCount">0</span>
            <button type="button" data-target="none" data-step="1" aria-label="なしを増やす">+</button>
          </div>
        </div>

        <div class="summary" id="summary"></div>
      </section>

      <section class="panel plans" aria-label="割り勘プラン">
        <h1>Plans</h1>
        <div class="plan-list" id="planList"></div>
      </section>
    </main>

    <script>
      const totalInput = document.querySelector("#total");
      const counts = { alcohol: 4, soft: 1, late: 1, none: 0 };
      const countEls = {
        alcohol: document.querySelector("#alcoholCount"),
        soft: document.querySelector("#softCount"),
        late: document.querySelector("#lateCount"),
        none: document.querySelector("#noneCount"),
      };
      const summary = document.querySelector("#summary");
      const planList = document.querySelector("#planList");
      let currentPlans = [];

      const yen = new Intl.NumberFormat("ja-JP", {
        style: "currency",
        currency: "JPY",
        maximumFractionDigits: 0,
      });

      function formatYen(value) {
        return yen.format(value);
      }

      function formatDiffYen(value) {
        return value > 0 ? `+${formatYen(value)}` : formatYen(value);
      }

      function roundTo(value, unit) {
        return Math.max(0, Math.round(value / unit) * unit);
      }

      function makePlan(name, badge, badgeClass, alcohol, soft, late, none) {
        const paid =
          alcohol * counts.alcohol + soft * counts.soft + late * counts.late + none * counts.none;
        return {
          name,
          badge,
          badgeClass,
          alcohol,
          soft,
          late,
          none,
          paid,
          remainder: Number(totalInput.value || 0) - paid,
          zeroLocked: false,
          savedAmounts: null,
          originalAmounts: { alcohol, soft, late, none },
        };
      }

      function calculatePlan(plan) {
        const paid =
          plan.alcohol * counts.alcohol +
          plan.soft * counts.soft +
          plan.late * counts.late +
          plan.none * counts.none;
        return {
          ...plan,
          paid,
          remainder: Number(totalInput.value || 0) - paid,
        };
      }

      function collectionDiff(plan) {
        return calculatePlan(plan).paid - Number(totalInput.value || 0);
      }

      function normalizeAmount(value) {
        return Math.max(0, Math.round(value));
      }

      function amountFields() {
        return ["alcohol", "soft", "late", "none"];
      }

      function planChanged(plan) {
        return amountFields().some((field) => plan[field] !== plan.originalAmounts[field]);
      }

      function generatePlans() {
        const total = Number(totalInput.value || 0);
        const payerCount = counts.alcohol + counts.soft + counts.late;
        if (total <= 0 || payerCount <= 0) return [];

        const roughEven = total / Math.max(1, payerCount);
        const targetAlcohol = roundTo(roughEven * 1.08, 500);
        const targetSoft = roundTo(targetAlcohol * 0.62, 500);
        const targetLate = roundTo(targetAlcohol * 0.38, 500);
        const options = [];

        for (let alcohol = 500; alcohol <= Math.max(total, 500); alcohol += 500) {
          for (let soft = 0; soft <= alcohol; soft += 500) {
            const maxLate = counts.late > 0 ? soft : 0;
            for (let late = 0; late <= maxLate; late += 500) {
              const paid = alcohol * counts.alcohol + soft * counts.soft + late * counts.late;
              const collectionDiff = paid - total;
              if (collectionDiff < 0 || collectionDiff >= 1000) continue;
              const softRatio = alcohol === 0 ? 0 : soft / alcohol;
              const lateRatio = alcohol === 0 ? 0 : late / alcohol;
              const score =
                Math.abs(alcohol - targetAlcohol) +
                Math.abs(soft - targetSoft) +
                Math.abs(late - targetLate) +
                Math.abs(softRatio - 0.62) * 1200 +
                Math.abs(lateRatio - 0.38) * 900 +
                Math.abs(collectionDiff - 200) * 0.5;
              options.push({ alcohol, soft, late, none: 0, collectionDiff, score });
            }
          }
        }

        options.sort((a, b) => a.score - b.score);
        const picked = [];
        const seen = new Set();
        for (const option of options) {
          const key = `${option.alcohol}-${option.soft}-${option.none}`;
          if (!seen.has(key)) {
            picked.push(option);
            seen.add(key);
          }
          if (picked.length === 3) break;
        }

        const plans = picked.map((option, index) => {
          const names = ["おすすめ", "飲む人寄り", "途中参加軽め"];
          const badges = ["端数少なめ", "バランス", "やさしめ"];
          const classes = ["green", "blue", "gold"];
          return makePlan(
            names[index],
            badges[index],
            classes[index],
            option.alcohol,
            option.soft,
            option.late,
            0,
          );
        });

        const evenUnit = roundTo(
          total / Math.max(1, counts.alcohol + counts.soft + counts.late + counts.none),
          500,
        );
        if (counts.none > 0 && evenUnit > 0) {
          const noneShare = Math.min(1000, evenUnit);
          const rest = total - noneShare * counts.none;
          const alcohol = roundTo((rest / Math.max(1, counts.alcohol + counts.soft + counts.late)) * 1.08, 500);
          const soft = roundTo(Math.min(alcohol, alcohol * 0.68), 500);
          const late = roundTo(Math.min(soft, alcohol * 0.4), 500);
          const supportPlan = makePlan("なしも少し参加", "全員感", "blue", alcohol, soft, late, noneShare);
          const supportDiff = collectionDiff(supportPlan);
          if (supportDiff >= 0 && supportDiff < 1500) plans.push(supportPlan);
        }

        return plans.slice(0, 4);
      }

      function renderAmountControl(planIndex, field, value, count, label) {
        return `
          <div class="amount-control">
            <button type="button" data-plan-index="${planIndex}" data-field="${field}" data-amount-step="-500" aria-label="${label}を500円下げる">−</button>
            <input type="number" min="0" step="1" inputmode="numeric" value="${value}" data-plan-index="${planIndex}" data-field="${field}" aria-label="${label}の金額" />
            <button type="button" data-plan-index="${planIndex}" data-field="${field}" data-amount-step="500" aria-label="${label}を500円上げる">+</button>
            <span class="multiply">× ${count}</span>
          </div>
        `;
      }

      function renderPlan(plan, index) {
        const calculated = calculatePlan(plan);
        const hasChanges = planChanged(calculated);
        return `
          <article class="plan" data-plan-card="${index}">
            <div class="plan-head">
              <div class="plan-title">
                <h2>${calculated.name}</h2>
                <button class="reset-button" type="button" data-reset-plan="${index}" ${hasChanges ? "" : "disabled"}>おすすめ設定に戻す</button>
              </div>
              <span class="badge ${calculated.badgeClass}">${calculated.badge}</span>
            </div>
            <div class="plan-body">
              <div class="line-item">
                <span>アルコールあり ${counts.alcohol}人</span>
                ${renderAmountControl(index, "alcohol", calculated.alcohol, counts.alcohol, "アルコールあり")}
              </div>
              <div class="line-item">
                <span>アルコールなし ${counts.soft}人</span>
                ${renderAmountControl(index, "soft", calculated.soft, counts.soft, "アルコールなし")}
              </div>
              <div class="line-item">
                <span>途中参加（少なめ） ${counts.late}人</span>
                ${renderAmountControl(index, "late", calculated.late, counts.late, "途中参加")}
              </div>
              <div class="line-item">
                <span>なし ${counts.none}人</span>
                ${renderAmountControl(index, "none", calculated.none, counts.none, "なし")}
              </div>
              <div class="line-item remainder">
                <span>端数</span>
                <div class="remainder-tools">
                  <button class="zero-button ${calculated.zeroLocked ? "is-on" : ""}" type="button" data-zero-remainder="${index}" aria-pressed="${calculated.zeroLocked}">
                    <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
                    <span>端数0にする</span>
                  </button>
                  <strong data-remainder>${formatDiffYen(collectionDiff(calculated))}</strong>
                </div>
              </div>
            </div>
          </article>
        `;
      }

      function updatePlanRemainder(planIndex) {
        const plan = currentPlans[planIndex];
        const planElement = planList.querySelector(`[data-plan-card="${planIndex}"]`);
        const remainderElement = planElement?.querySelector("[data-remainder]");
        if (!plan || !remainderElement) return;
        remainderElement.textContent = formatDiffYen(collectionDiff(plan));
      }

      function updatePlanValue(planIndex, field, value) {
        const plan = currentPlans[planIndex];
        if (!plan || !Object.prototype.hasOwnProperty.call(plan, field)) return false;
        plan[field] = normalizeAmount(Number(value || 0));
        if (["alcohol", "soft", "late", "none"].includes(field)) {
          plan.zeroLocked = false;
          plan.savedAmounts = null;
        }
        return true;
      }

      function zeroRemainder(planIndex) {
        const plan = currentPlans[planIndex];
        if (!plan) return;
        const diff = collectionDiff(plan);
        if (diff === 0) return;

        const candidates = ["alcohol", "soft", "late", "none"]
          .filter((field) => counts[field] > 0);
        const target = candidates
          .filter((field) => diff < 0 || plan[field] >= diff / counts[field])
          .sort((a, b) => plan[a] - plan[b] || a.localeCompare(b))[0];
        if (!target) return;

        plan[target] = normalizeAmount(plan[target] - diff / counts[target]);
      }

      function toggleZeroRemainder(planIndex) {
        const plan = currentPlans[planIndex];
        if (!plan) return;

        if (plan.zeroLocked) {
          if (plan.savedAmounts) {
            amountFields().forEach((field) => {
              plan[field] = plan.savedAmounts[field];
            });
          }
          plan.zeroLocked = false;
          plan.savedAmounts = null;
          return;
        }

        plan.savedAmounts = {
          alcohol: plan.alcohol,
          soft: plan.soft,
          late: plan.late,
          none: plan.none,
        };
        zeroRemainder(planIndex);
        plan.zeroLocked = collectionDiff(plan) === 0;
      }

      function resetPlan(planIndex) {
        const plan = currentPlans[planIndex];
        if (!plan) return;
        amountFields().forEach((field) => {
          plan[field] = plan.originalAmounts[field];
        });
        plan.zeroLocked = false;
        plan.savedAmounts = null;
      }

      function render(regeneratePlans = true) {
        Object.entries(countEls).forEach(([key, element]) => {
          element.textContent = counts[key];
        });

        const total = Number(totalInput.value || 0);
        const people = counts.alcohol + counts.soft + counts.late + counts.none;
        summary.innerHTML = `<strong>${formatYen(total)}</strong> / 参加 ${people}人 / 支払い対象 ${counts.alcohol + counts.soft + counts.late}人`;

        if (regeneratePlans) {
          currentPlans = generatePlans();
        }
        planList.innerHTML = currentPlans.length
          ? currentPlans.map(renderPlan).join("")
          : `<div class="empty">全体会計と人数を入れると、支払い案が表示されます。</div>`;
      }

      document.querySelectorAll("[data-target]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.target;
          const step = Number(button.dataset.step);
          counts[key] = Math.max(0, counts[key] + step);
          render(true);
        });
      });

      planList.addEventListener("click", (event) => {
        const resetButton = event.target.closest("[data-reset-plan]");
        if (resetButton) {
          resetPlan(Number(resetButton.dataset.resetPlan));
          render(false);
          return;
        }

        const zeroButton = event.target.closest("[data-zero-remainder]");
        if (zeroButton) {
          toggleZeroRemainder(Number(zeroButton.dataset.zeroRemainder));
          render(false);
          return;
        }

        const button = event.target.closest("[data-amount-step]");
        if (!button) return;
        const planIndex = Number(button.dataset.planIndex);
        const plan = currentPlans[planIndex];
        const field = button.dataset.field;
        if (!plan || !field) return;
        updatePlanValue(planIndex, field, Number(plan[field] || 0) + Number(button.dataset.amountStep));
        render(false);
      });

      planList.addEventListener("input", (event) => {
        const input = event.target.closest("input[data-plan-index][data-field]");
        if (!input) return;
        const planIndex = Number(input.dataset.planIndex);
        const field = input.dataset.field;
        if (!updatePlanValue(planIndex, field, input.value)) return;
        updatePlanRemainder(planIndex);
      });

      planList.addEventListener("change", (event) => {
        const input = event.target.closest("input[data-plan-index][data-field]");
        if (!input) return;
        const planIndex = Number(input.dataset.planIndex);
        const plan = currentPlans[planIndex];
        const field = input.dataset.field;
        if (!plan || !field) return;
        if (Number(input.value || 0) < 0) {
          updatePlanValue(planIndex, field, 0);
        }
        input.value = plan[field];
        render(false);
      });

      totalInput.addEventListener("input", () => render(true));
      render(true);
    </script>
  </body>
</html>
